name: Poll Telegram for Links

on:
  schedule:
    # Run automatically every day at 9:45 AM PT (16:45 UTC)
    - cron: "45 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll-telegram:
    name: Poll Telegram Updates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run poll script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python scripts/telegram_bot_poll_once.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/links.txt inbox/telegram_offset.txt || true
          if git diff --staged --quiet; then
            echo "No new updates."
          else
            git commit -m "🤖 Sync Telegram links to inbox [skip ci]"
            git push
          fi
