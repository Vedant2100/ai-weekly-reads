

name: Process Inbox & Generate Ebook

on:
  push:
    paths:
      - 'inbox/links.txt'
  workflow_dispatch:
  schedule:
    # Run automatically every day at 10:00 AM PT (17:00 UTC)
    - cron: "0 17 * * *"

permissions:
  contents: write

jobs:
  generate-ebook:
    name: Generate Categorized AI Ebook
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (Pandoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Process Inbox & Build Ebook
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KINDLE_ENABLED: "true"
          KINDLE_DELIVERY_METHOD: "smtp"
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          KINDLE_SENDER_EMAIL: ${{ secrets.KINDLE_SENDER_EMAIL }}
          KINDLE_SMTP_HOST: ${{ secrets.KINDLE_SMTP_HOST }}
          KINDLE_SMTP_PORT: ${{ secrets.KINDLE_SMTP_PORT }}
          KINDLE_SMTP_USERNAME: ${{ secrets.KINDLE_SMTP_USERNAME }}
          KINDLE_SMTP_PASSWORD: ${{ secrets.KINDLE_SMTP_PASSWORD }}
        run: |
          python scripts/process_inbox_batch.py

      - name: Upload EPUB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-weekly-reads-ebook
          path: output/*.epub
          if-no-files-found: ignore



      - name: Commit and push generated notes & ebook
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add inbox/links.txt || true
          git add inbox/archive.txt || true
          git add weekly/latest.md || true
          git add latest.md || true
          if git diff --staged --quiet; then
            echo "No new summaries or ebooks generated."
          else
            git commit -m "🤖 Auto-generate weekly ebook & summaries [skip ci]"
            git push
          fi

