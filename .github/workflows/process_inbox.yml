name: Process Inbox & Generate Ebook

on:
  push:
    paths:
      - 'inbox/links.txt'
  workflow_dispatch:
  schedule:
    # Run automatically every Sunday at 8:00 AM UTC
    - cron: "0 8 * * 0"

permissions:
  contents: write

jobs:
  generate-ebook:
    name: Generate Categorized AI Ebook
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies (Pandoc)
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Process Inbox & Build Ebook
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          python scripts/process_inbox_batch.py

      - name: Upload EPUB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-weekly-reads-ebook
          path: output/*.epub
          if-no-files-found: ignore

      - name: Commit and push generated notes & ebook
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/ knowledge_base/ inbox/ weekly/ raw_transcripts/ || true
          if git diff --staged --quiet; then
            echo "No new summaries or ebooks generated."
          else
            git commit -m "🤖 Auto-generate weekly ebook & summaries [skip ci]"
            git push
          fi
